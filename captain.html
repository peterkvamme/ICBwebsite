<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Captain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  

  <main class="page">
    <section class="card" id="loginCard">
      <h2>Login</h2>

      <div class="grid">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
      </div>

      <p id="loginMsg" class="small"></p>
    </section>

    <section class="card tracking-card tracking-off" id="dashboard" style="display:none;">
      <h2 id="trackingStatus" class="tracking-title">Captain Dashboard — Not Tracking</h2>

      <p id="gpsInfo" class="small tracking-detail"></p>
      <p id="sentInfo" class="small tracking-detail"></p>

      <div class="actions">
        <button id="startBtn">Start Sharing Location</button>
        <button id="stopBtn" class="danger">Stop Sharing Location</button>
        <button id="toggleLocationVisibilityBtn" class="secondary visibility-toggle">Hide Location from Customers</button>
      </div>
    </section>

    <section class="card" id="statusControls" style="display:none;">
      <h2>Status</h2>

      <div class="grid status-grid three-status-grid">
        <button data-headline="Selling now on Gull Lake!" data-status="selling">Selling now on Gull Lake!</button>
      </div>

      <input id="customStatusInput" placeholder="Type in a custom status here">

      <h3>Customer announcement</h3>
      <input id="noteInput" placeholder="Example: Back at 2:30 near Bar Harbor">
      <button id="saveStatusAnnouncementBtn" class="secondary">Set Status/Announcement</button>
    </section>

    <section class="status-card captain-preview-card" id="captainPreview" style="display:none;">
      <div class="status-layout">
        <div class="logo-column">
          <img src="logo-header.png" class="status-logo" alt="Ice Cream Boat logo">
        </div>
        <div class="text-column">
          <div class="brand-name">Ice Cream Boat</div>
          <h1 id="previewHeadline">Finding the boat...</h1>
          <div class="location-updated-row">
            <div id="previewArea" class="location-line">Getting current location.</div>
            <div id="previewUpdated" class="updated-text"></div>
          </div>
          <div id="previewNote" class="note-line"></div>
          <a id="previewMapsLink" class="button" target="_blank" rel="noopener">
            Open Latest Location
          </a>
        </div>
      </div>
    </section>

  </main>

  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>
  <script type="module" src="captain.js?v=12"></script>
</body>
</html>

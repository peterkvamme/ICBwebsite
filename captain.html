<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captain Page</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <div id="header">
    <img src="logo-header.png" id="logo">
  </div>

  <div id="map"></div>

  <div class="container">
    <div id="status">
      GPS Status: <span id="gps-status">Initializing...</span> <br>
      Accuracy: <span id="gps-accuracy">--</span> meters <br>
      Speed: <span id="gps-speed">--</span> mph
    </div>

    <hr>

    <div class="controls">
      <h3>Boat Status</h3>
      <button id="btn-open" class="btn btn-success">Open for Business</button>
      <button id="btn-closed" class="btn btn-danger">Closed</button>
    </div>

    <hr>

    <!-- RESTORED GPS DOWNLOAD SECTION -->
    <div class="download-controls">
      <h3>Export Data</h3>
      <button id="btn-download-gps" class="btn btn-info" style="width: 100%; margin-top: 5px;">
        Download GPS History (.csv)
      </button>
    </div>
  </div>

  <!-- Firebase App (the SDK v8 used in your project) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>
  <script src="captain.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Captain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
    <img src="logo.png" class="site-logo" alt="Ice Cream Boat logo">

    <div class="site-title-block">
        <h1>Captain Dashboard</h1>
        <p>Private boat controls</p>
    </div>
</header>

<main class="page">

<section class="card" id="loginCard">

<h2>Login</h2>

<div class="grid">

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

</div>

<p id="loginMsg" class="small"></p>

</section>



<section
class="card"
id="dashboard"
style="display:none;">

<h2 id="trackingStatus">
Not tracking
</h2>

<p id="gpsInfo" class="small"></p>

<p id="sentInfo" class="small"></p>

<h3>Current customer announcement</h3>

<div
id="currentNote"
class="note-preview">

No announcement.

</div>

<div class="actions">

<button id="startBtn">
Start Sharing Location
</button>

<button
id="stopBtn"
class="danger">

Stop Sharing

</button>

</div>

</section>



<section
class="card"
id="statusControls"
style="display:none;">

<h2>Status</h2>

<div class="grid">

<button
data-headline="Available now"
data-status="available">

Available Now

</button>

<button
data-headline="Back in 30 minutes"
data-status="paused"
data-pause="30">

Back in 30 Minutes

</button>

<button
data-headline="Back in 1 hour"
data-status="paused"
data-pause="60">

Back in 1 Hour

</button>

<button
data-headline="Back in 2 hours"
data-status="paused"
data-pause="120">

Back in 2 Hours

</button>

<button
data-headline="Starting soon"
data-status="starting_soon">

Starting Soon

</button>

<button
data-headline="Weather delay"
data-status="weather_delay">

Weather Delay

</button>

<button
data-headline="Done for today"
data-status="done">

Done for Today

</button>

</div>


<h3 style="margin-top:30px;">
Custom status
</h3>

<input
id="customStatusInput"
placeholder="Example: Available near Bar Harbor">

<button
id="saveCustomStatusBtn"
class="secondary">

Set Status

</button>


<h3 style="margin-top:30px;">
Customer announcement
</h3>

<input
id="noteInput"
placeholder="Example: Back at 2:30 near Bar Harbor">

<button
id="saveNoteBtn"
class="secondary">

Save Announcement

</button>

</section>

</main>

<script src="firebase-config.js"></script>

<script type="module" src="captain.js"></script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Captain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  

  <main class="page">
    <section class="card" id="loginCard">
      <h2>Login</h2>

      <div class="grid">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
      </div>

      <p id="loginMsg" class="small"></p>
    </section>

    <section class="card" id="dashboard" style="display:none;">
      <h2 id="trackingStatus" class="tracking-banner tracking-off">Captain Dashboard — Not Tracking</h2>

      <p id="gpsInfo" class="small"></p>
      <p id="sentInfo" class="small"></p>

      <h3>What customers see</h3>
      <section class="status-card captain-preview-card">
        <div class="status-layout">
          <div class="logo-column">
            <img src="logo-header.png" class="status-logo" alt="Ice Cream Boat logo">
          </div>
          <div class="text-column">
            <div class="brand-name">Ice Cream Boat</div>
            <h1 id="previewHeadline">Finding the boat...</h1>
            <div class="location-updated-row">
              <div id="previewArea" class="location-line">Getting current location.</div>
              <div id="previewUpdated" class="updated-text"></div>
            </div>
            <div id="previewNote" class="note-line"></div>
            <a id="previewMapsLink" class="button" target="_blank" rel="noopener">
              Open Latest Location
            </a>
          </div>
        </div>
      </section>

      <div class="actions">
        <button id="startBtn">Start Sharing Location</button>
        <button id="stopBtn" class="danger">Stop Sharing</button>
      </div>
    </section>

    <section class="card" id="statusControls" style="display:none;">
      <h2>Status</h2>

      <div class="grid status-grid">
        <button data-headline="Selling now on Gull Lake" data-status="selling">Selling now on Gull Lake</button>
        <button data-headline="Starting Soon" data-status="starting_soon">Starting Soon</button>
        <button data-headline="On a break, be back soon" data-status="paused">On a break, be back soon</button>
        <button data-headline="Not selling today" data-status="done">Not selling today</button>
      </div>

      <h3>Custom status</h3>
      <input id="customStatusInput" placeholder="Example: Selling now near Ernie's">

      <h3>Customer announcement</h3>
      <input id="noteInput" placeholder="Example: Back at 2:30 near Bar Harbor">
      <button id="saveStatusAnnouncementBtn" class="secondary">Set Status/Announcement</button>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>
  <script type="module" src="captain.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ice Cream Boat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
  <main class="page public-page">
    <section class="status-card">
      <div class="status-row">
        <div class="status-logo-wrap">
          <img src="logo.png" class="status-logo" alt="Ice Cream Boat logo">
        </div>

        <div class="status-info">
          <div class="brand-name">Ice Cream Boat</div>
          <h1 id="headline">Finding the boat...</h1>
          <div class="location-meta-row">
            <div id="area" class="location-line">Getting current location.</div>
            <div id="updated" class="updated-text"></div>
          </div>
          <div id="note" class="note-line"></div>
        </div>
      </div>

      <a id="mapsLink" class="button" target="_blank" rel="noopener">
        Open latest location in Maps
      </a>
    </section>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="about-section">
      <p>Ice Cream Boat on Gull Lake, MN</p>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Find the Ice Cream Boat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<header class="hero">
    <img src="images/logo.png" class="logo" alt="Ice Cream Boat logo">

    <div>
        <h1>Ice Cream Boat</h1>
        <p class="subtitle">Live location on Gull Lake</p>
    </div>
</header>

  <main>
    <section class="card">
      <div id="headline" class="status">Checking boat status...</div>
      <div id="area" class="area"></div>
      <div id="note" class="small"></div>
      <div id="updated" class="small"></div>
      <div id="stale" class="small warning"></div>
      <div class="actions two">
        <a id="mapsLink" class="button" target="_blank" rel="noopener">Open in Maps</a>
        <a class="button" href="sms:+12185551212">Text the Boat</a>
      </div>
    </section>

    <section class="card">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>

  <script type="module" src="app.js"></script>
</body>
</html>

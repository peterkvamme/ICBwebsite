<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ice Cream Boat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
  <header class="site-header">
    <img src="logo.png" class="site-logo" alt="Ice Cream Boat logo">
    <div class="site-title-block">
      <h1>Ice Cream Boat</h1>
      <p>Live location on Gull Lake</p>
    </div>
  </header>

  <main class="page">
    <section class="status-card">
      <h2 id="headline">Finding the boat...</h2>

      <div id="area" class="location-line">Getting current location.</div>

      <div id="note" class="note-line"></div>

      <div id="updated" class="updated-text"></div>

      <div id="stale" class="warning-line" style="display:none;"></div>

      <div class="actions">
        <a id="mapsLink" class="button" target="_blank" rel="noopener">
          Open in Maps
        </a>
      </div>
    </section>

    <section class="map-card">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="firebase-config.js"></script>
  <script src="landmarks.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
